services:
  db:
    image: postgres:16-alpine
    container_name: arenago-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arenago}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  app:
    image: node:20-alpine
    container_name: arenago-app-dev
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env.development.docker
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-arenago}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

  ingest:
    image: node:20-alpine
    container_name: arenago-ingest-dev
    working_dir: /app
    depends_on:
      - db
    env_file:
      - .env.development.docker
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-arenago}
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run ingest:osm"
    profiles: ["tools"]

volumes:
  postgres_data_dev:
